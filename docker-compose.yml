services:
  playwright-server:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    ports:
      - "3000:3000"
    ipc: host
    restart: unless-stopped

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    ipc: host
    environment:
      - CI=true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -d "node_modules" ] || [ package-lock.json -nt node_modules ]; then
          echo "Updating dependencies (respecting lockfile)..."
          npm install --no-save
        else
          echo "Dependencies are up to date."
        fi
        npm run test

volumes:
  frontend_node_modules:
