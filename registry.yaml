---
packages:
  - type: github_release
    name: cccc
    repo_owner: moznion
    repo_name: cccc
    asset: 'cccc-{{.Version}}-{{.Arch}}-{{.OS}}.tar.gz'
    supported_envs:
      - darwin
      - linux
    overrides:
      - goos: darwin
        goarch: amd64
        replacements: { darwin: apple-darwin, amd64: x86_64 }
      - goos: darwin
        goarch: arm64
        replacements: { darwin: apple-darwin, arm64: aarch64 }
      - goos: linux
        goarch: amd64
        replacements: { linux: unknown-linux-musl, amd64: x86_64 }
      - goos: linux
        goarch: arm64
        replacements: { linux: unknown-linux-musl, arm64: aarch64 }
    files:
      - name: cccc
    checksum:
      type: github_release
      asset: cccc-{{.Version}}-{{.Arch}}-{{.OS}}.sha256
      algorithm: sha256
