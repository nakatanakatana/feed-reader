# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: true
  supported_envs:
  - all
registries:
- type: standard
  ref: v4.529.0 # renovate: depName=aquaproj/aqua-registry
- name: local
  type: local
  path: registry.yaml
packages:
- name: bufbuild/buf@v1.71.0
- name: golang/go@go1.26.4
- name: golangci/golangci-lint@v2.12.2
- name: goreleaser/goreleaser@v2.16.0
- name: k1LoW/mo@v1.6.2
- name: k1LoW/octocov@v0.75.8
- name: sqlc-dev/sqlc@v1.31.1
- name: cccc-es@v0.3.0
  registry: local
- name: cccc-go@v0.3.0
  registry: local
