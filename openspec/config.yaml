schema: spec-driven

context: |
  Language: Japanese for user interaction; English for all code, documentation, and commits.

  Tech Stack:
  - Backend: Go (Connect RPC, SQLite/sqlc, gofeed, buf, aqua)
  - Frontend: SolidJS, TanStack Router/Query/DB, TypeScript, Panda CSS
  - Testing: gotest.tools (with hand-written mocks), rapid, Vitest, Playwright, MSW, fast-check
  - Tooling: OpenTelemetry, BiomeJS, Docker

  Workflow & Conventions:
  - Test-Driven Development (TDD) required (Red-Green-Refactor)
  - Target High Code Coverage (>80%)
  - Conventional Commits strictly followed
  - Non-Interactive & CI-Aware commands preferred

